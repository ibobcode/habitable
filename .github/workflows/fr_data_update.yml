name: FR - Data Update

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/fr/data_*.py'
      - 'scripts/fr/schema.py'

concurrency:
  group: git-push-parquets
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      scripts: ${{ steps.changed.outputs.scripts }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed data scripts
        id: changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q 'scripts/fr/schema.py'; then
            SCRIPTS=$(ls scripts/fr/data_*.py | jq -R -s -c 'split("\n")[:-1]')
          else
            SCRIPTS=$(git diff --name-only HEAD~1 HEAD \
              | grep 'scripts/fr/data_.*\.py' \
              | jq -R -s -c 'split("\n")[:-1]')
          fi
          echo "scripts=$SCRIPTS" >> $GITHUB_OUTPUT

  run-scripts:
    needs: detect
    if: ${{ needs.detect.outputs.scripts != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Execute all changed scripts sequentially
        run: |
          for script in $(echo '${{ needs.detect.outputs.scripts }}' | jq -r '.[]'); do
            echo "Running $script..."
            python $script
          done

      - name: Commit and push parquets
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add parquets/fr/*.parquet
          git commit -m "auto: update parquets" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main