name: FR - Weather Data Update

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/fr/data_weather.py'
      - 'scripts/fr/schema.py'

concurrency:
  group: git-push-parquets
  cancel-in-progress: false

jobs:
  generate-parquet:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Execute script
        run: python scripts/fr/data_weather.py

      - name: Commit and push to branch
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -b auto/weather-${{ github.run_id }}
          git add parquets/fr/*.parquet
          git commit -m "auto: update weather parquet" || echo "No changes to commit"
          git push origin auto/weather-${{ github.run_id }}

      - name: Create and auto-merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "auto: update weather parquet" \
            --body "Generated by GitHub Actions" \
            --base main \
            --head auto/weather-${{ github.run_id }}
          gh pr merge --auto --squash