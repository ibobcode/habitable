name: FR - DVF Data Update

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/fr/data_DVF.py'
      - 'scripts/fr/schema.py'

concurrency:
  group: git-push-parquets
  cancel-in-progress: false

jobs:
  generate-parquet:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Execute script
        run: python scripts/fr/data_DVF.py

      - name: Commit and push parquet
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add parquets/fr/*.parquet
          git commit -m "auto: update dvf parquet" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main