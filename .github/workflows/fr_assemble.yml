name: FR - Assemble and Release

on:
  push:
    branches:
      - main
    paths:
      - 'parquets/fr/*.parquet'
      - 'scripts/fr/assemble.py'

concurrency:
  group: assemble-release
  cancel-in-progress: false

jobs:
  assemble-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Execute assembly script
        run: python scripts/fr/assemble.py

      - name: Copy GeoJSON to public
        run: |
          mkdir -p public/data
          cp france_habitable.geojson public/data/france_habitable.geojson

      - name: Commit and push public data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/france_habitable.geojson
          git commit -m "auto: update france_habitable.geojson" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main

      - name: Generate release tag
        run: echo "VERSION=v$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_ENV

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ env.VERSION }} france_habitable.geojson \
            --title "France Habitable Data ${{ env.VERSION }}" \
            --notes "Automated release of the assembled GeoJSON dataset."